openapi: 3.0.3
info:
  title: Pupils API
  version: 1.0.0

paths:
  /api/pupils/courses:
    get:
      tags:
        - PupilsCourses
      summary: Get list of pupils with their courses and status
      operationId: getPupilsCourses
      responses:
        '200':
          description: List of pupils and their courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PupilCourseResponse'

components:
  schemas:
    PupilCourseResponse:
      type: object
      properties:
        pupil:
          type: string
        courseName:
          type: string
        courseStatus:
          type: string
