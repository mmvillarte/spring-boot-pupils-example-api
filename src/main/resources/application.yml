spring:
# security.user:
  #    name: ${APP_USER}
  #    password: ${APP_PWD}
  #    roles: { ROLE_VIEWER }
  application:
    name: spring-boot-pupils-example-api

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres-db-test
    username: ${APP_USER}
    password: ${APP_PWD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: false
    schemas: PUPIL_COURSE_SCHEMA
    default-schema: PUPIL_COURSE_SCHEMA
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springdoc: INFO
    corg.test.opendataaragon: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG
    level:
      org.flywaydb: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

server:
  port: 8080

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

jasypt:
  encryptor:
    password: ${JASYPT_SEED}
    algorithm: PBEWithHMACSHA512AndAES_256
    key-obtention-iterations: 1000
    pool-size: 1
    provider-name: SunJCE
    string-output-type: base64
